<div class="container-fluid d-flex flex-column justify-content-center start_container">
  <div class="row">
    <div class="col-md-2 mx-md-5 p-1 text-start">
      <div class="row mb-1">
        <div class="col-12 p-1 text-start leaderboard">
          <h4>Leaderboard</h4>
          <ol>
            <li *ngFor="let user of leaderboard">
              {{ user.username }} — {{ user.highScore }}
            </li>
          </ol>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="row mb-1">
            <div class="col-12">
              <h5 class="message">Good luck, {{username}}! Score: {{points}}! Mode: Hard!</h5>
            </div>
          </div>

          <div class="row">
            <div class="col-12">
              <div class="row mb-1">
                <div class="col-12">
                  <button class="btn btn-success btn-lg d-block w-100 fw-bold" (click)="startGame()">
                    {{ playing ? 'Restart' : (started ? 'Play again' : 'Play') }}
                  </button>
                </div>
              </div>

              <div class="row mb-1">
                <div class="col-12">
                  <button class="btn btn-danger btn-lg d-block w-100 fw-bold" (click)="goToStartPage()">
                    Back
                  </button>
                </div>
              </div>

              <div class="row mb-1">
                <div class="col-12">
                  <button class="btn btn-primary btn-lg d-block w-100 fw-bold" (click)="onLogout()">
                    Logout
                  </button>
                </div>
              </div>

              <div class="row mb-1">
                <div class="col-12">
                  <button class="btn btn-warning btn-lg d-block w-100 fw-bold" (click)="togglePause()">
                    {{ pause ? 'Resume' : 'Pause' }}
                  </button>
                </div>
              </div>

              <div class="row mb">
                <div class="col-12">
                  <h4 style="color: white;">{{message}}</h4>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-9">
      <div id="game">

        <!-- plasam marul, coordonatele de baza for fi coltul din stanga sus, la fel si la sarpe -->
        <div id="apple" [style]="{top: apple.y +'px', left: apple.x + 'px'}"></div>

        <!-- {{ apple | json}} -->
        @for(block of snake; track $index) {
        <!-- {{ block | json}} -->
        <div class="block" [class.head]="$index === snake.length - 1"
          [style]="{top: block.y + 'px', left: block.x + 'px'}">
        </div> <!-- adaugam clasa head doar la capul sarpelui -->
        }

      </div>
    </div>
  </div>
</div>
