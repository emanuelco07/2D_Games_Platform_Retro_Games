<main>
  <div class="container">
    <div class="menu">
      <div class="leaderboard">
        <h4>Rankings - Snake</h4>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>High Score</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of rankings; let i = index">
              <td>{{ i + 1 }}</td>
              <td>{{ user.username }}</td>
              <td>{{ user.highScore }}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <button (click)="goToRankingsPage()">Back</button>
    </div>
  </div>
</main>
